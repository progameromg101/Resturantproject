<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Berteis Steakhouse | Reservations</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <h1 class="logo">Berteis Steakhouse</h1>
      <button class="menu-toggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links collapsed">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="reservations.html">Reservations</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <section class="page-banner">
      <div class="container">
        <h2>Reservations</h2>
        <p>Fill out the form below to request a table.</p>
      </div>
    </section>

    <section class="content-section">
      <div class="container form-container">

        <div id="reservation-confirm" class="reservation-confirm" hidden></div>

        <form class="reservation-form" action="#" method="get">

          <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="date">Reservation Date</label>
              <input type="date" id="date" name="date" required>
            </div>

            <div class="form-group">
              <label for="time">Reservation Time</label>
              <input type="time" id="time" name="time" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="guests">Number of Guests</label>
              <input type="number" id="guests" name="guests" min="1" max="12" placeholder="2" required>
            </div>

            <div class="form-group">
              <label for="occasion">Occasion</label>
              <select id="occasion" name="occasion">
                <option value="">Select one</option>
                <option value="birthday">Birthday</option>
                <option value="anniversary">Anniversary</option>
                <option value="family">Family Dinner</option>
                <option value="date-night">Date Night</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="notes">Special Requests</label>
            <textarea id="notes" name="notes" rows="5" placeholder="Enter allergies, seating requests, or extra information"></textarea>
          </div>

          <button type="submit" class="btn">Submit Reservation</button>
        </form>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Berteis Steakhouse. All rights reserved.</p>
  </footer>
</body>
</html>
